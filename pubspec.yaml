name: shonenquiz
description: "Shonen Quiz — quiz de animes com avatares de gatos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegação
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Armazenamento seguro (JWT)
  flutter_secure_storage: ^9.2.4

  # Google Sign-In
  google_sign_in: 6.2.2

  # Ícones
  cupertino_icons: ^1.0.8

  # Cache de imagens da CDN (disco + memória)
  cached_network_image: ^3.4.1

  # Sons e efeitos sonoros
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
